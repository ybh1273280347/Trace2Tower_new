benchmark: webshop
split: train
agent_model: deepseek-v4-flash
retrieval_policy_scope: high_context_bundle
direct_mid_top_k: 8
feedback_manifest: experiments/webshop/original-concept-v1/manifests/refinement-train.jsonl
construction_pool: p100
evaluation_manifest: experiments/webshop/event-tower-v2/manifests/test.jsonl
repeat_ids: [0, 1, 2]
disjoint_from:
  - experiments/webshop/event-tower-v2/manifests/validation.jsonl
  - experiments/webshop/event-tower-v2/manifests/test.jsonl
  - experiments/webshop/original-concept-v1/manifests/test-b.jsonl
  - experiments/webshop/event-tower-v2/manifests/ablation.jsonl
  - experiments/webshop/event-tower-v2/manifests/ablation-train.jsonl
primary_pareto_objectives:
  - performance_level
  - paired_reward_gain
  - guarded_step_saving
secondary_metrics:
  - guarded_chat_token_saving
  - mean_chat_input_tokens
  - mean_chat_output_tokens
min_exposure_count: 10
status_tie_epsilon: 0.01
card_level_lifecycle: disabled_due_to_bundle_confounding
