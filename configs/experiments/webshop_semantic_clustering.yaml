method: semantic_clustering
semantic_only: true
use_transition_edge: false
use_outcome_edge: false
use_contrastive_decomposition: false
failure_penalty: 0.0
min_mid_clusters: 2
max_mid_clusters: 20
random_state: 42
max_high_path_length: 4
high_min_support_ratio: 0.10
high_path_epsilon: 0.000001
success_threshold: 0.999
