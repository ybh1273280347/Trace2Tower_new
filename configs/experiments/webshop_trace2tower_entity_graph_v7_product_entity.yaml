method: trace2tower
semantic_only: false
use_transition_edge: true
use_outcome_edge: true
use_contrastive_decomposition: true
failure_penalty: 1.0
min_mid_clusters: 2
random_state: 42
max_high_path_length: 20
high_min_support_ratio: 0.0
high_min_success_count: 1
high_path_epsilon: 0.000001
success_threshold: 0.999
collapse_duplicate_embeddings: true
semantic_neighbor_scope: global
high_path_discovery: goal_conditioned_trajectory
graph_outcome_mode: continuous_residual
continuous_residual_weight: 0.2
